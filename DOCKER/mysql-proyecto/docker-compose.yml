services:
  mysql:
    image: mysql:8.0
    container_name: mysql-root-full
    environment:
      MYSQL_ROOT_PASSWORD: "Granada123."  # ¡Cambia por seguridad!
      MYSQL_ROOT_HOST: "%"  # Root desde cualquier IP
      MYSQL_DATABASE: "mi_db"
    ports:
      - "3306:3306"
    volumes:
      - ./dataSQL:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped  # Reinicia automáticamente

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mysql-phpmyadmin-1
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    restart: unless-stopped
